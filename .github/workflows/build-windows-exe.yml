name: Build Windows EXE

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-amd64:
    name: Build Windows amd64 executable
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm run build

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache-dependency-path: backend/go.sum

      - name: Build Windows amd64 exe
        working-directory: backend
        shell: bash
        run: |
          mkdir -p dist
          VERSION="$(tr -d '\r\n' < ./cmd/server/VERSION)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build \
            -tags embed \
            -trimpath \
            -ldflags="-s -w -X main.Version=${VERSION} -X main.Commit=${GITHUB_SHA} -X main.Date=${DATE} -X main.BuildType=release" \
            -o dist/sub2api.exe \
            ./cmd/server

      - name: Upload Windows exe
        uses: actions/upload-artifact@v7
        with:
          name: sub2api-windows-amd64
          path: backend/dist/sub2api.exe
          if-no-files-found: error
          retention-days: 14
